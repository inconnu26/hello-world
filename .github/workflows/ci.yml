name: Tests

on:
  push:
    branches:
      - master
      - 'claude/**'
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Tests unitaires (Jest)
        run: npm run test:unit

      - name: Build de production
        run: npm run build

      - name: Installer le navigateur Playwright
        run: npx playwright install --with-deps chromium

      - name: Tests end-to-end (Playwright)
        run: npx playwright test

      - name: Archiver le rapport en cas d'échec
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
